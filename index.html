<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>英语声音游戏 - English Sound Game</title>
  <script>p5.disableFriendlyErrors = true;</script>
  <script>
    window._p5LoadError = false;
  </script>
  <script src="https://cdn.bootcdn.net/ajax/libs/p5.js/1.11.3/p5.min.js"
          onerror="window._p5LoadError=true;document.getElementById('loading-msg').innerHTML='😿 加载失败了...<br><span style=font-size:14px;color:#999>请切换到WiFi或4G网络后刷新页面</span>'"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { 
      width: 100%; height: 100%; overflow: hidden;
      background: #87CEEB;
      font-family: -apple-system, 'Segoe UI', sans-serif;
      touch-action: manipulation; /* prevent double-tap zoom */
      -webkit-tap-highlight-color: transparent;
    }
    #canvas-container {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
    }
    canvas { display: block; }
  </style>
</head>
<body>
  <div id="canvas-container">
    <div id="loading-msg" style="text-align:center; padding-top:40vh; font-size:20px; color:#5D4037; font-family:sans-serif;">
      🐱 正在加载小游戏...<br>
      <span style="font-size:14px; color:#999;">如果一直卡住，请用浏览器打开而不是微信/QQ</span>
    </div>
  </div>

<script>
// ============================================================
// English Sound Game - 英语声音游戏
// For children ages 4-6 learning English as a second language
// ============================================================

// --- Word Data ---
const WORDS = [
  { word: 'cat', emoji: '🐱', chinese: '猫' },
  { word: 'dog', emoji: '🐶', chinese: '狗' },
  { word: 'sun', emoji: '☀️', chinese: '太阳' },
  { word: 'hat', emoji: '🎩', chinese: '帽子' },
  { word: 'bed', emoji: '🛏️', chinese: '床' },
  { word: 'pig', emoji: '🐷', chinese: '小猪' },
  { word: 'cup', emoji: '🥛', chinese: '杯子' },
  { word: 'fish', emoji: '🐟', chinese: '鱼' },
  { word: 'star', emoji: '⭐', chinese: '星星' },
  { word: 'book', emoji: '📖', chinese: '书' },
  { word: 'tree', emoji: '🌳', chinese: '树' },
  { word: 'milk', emoji: '🥛', chinese: '牛奶' },
  { word: 'hand', emoji: '✋', chinese: '手' },
  { word: 'ball', emoji: '⚽', chinese: '球' },
  { word: 'duck', emoji: '🦆', chinese: '鸭子' },
  { word: 'frog', emoji: '🐸', chinese: '青蛙' },
  { word: 'bird', emoji: '🐦', chinese: '小鸟' },
  { word: 'cake', emoji: '🎂', chinese: '蛋糕' },
  { word: 'bus',  emoji: '🚌', chinese: '公共汽车' },
  { word: 'moon', emoji: '🌙', chinese: '月亮' },
];

// --- Color Palette ---
const PALETTE = {
  skyTop:    '#87CEEB',
  skyBottom: '#E0F0FF',
  grass:     '#7EC850',
  grassDark: '#5DA830',
  cardBg:    '#FFFFFF',
  cardBorder:'#E0E0E0',
  cardHover: '#FFF9C4',
  cardCorrect:'#C8E6C9',
  cardWrong:  '#FFCDD2',
  catBody:  '#FF9800',
  catBelly:'#FFE0B2',
  text:     '#333333',
  title:    '#5D4037',
  button:   '#FF7043',
  buttonText:'#FFFFFF',
  cloud:    '#FFFFFF',
};

// --- State ---
let currentWord = null;       // the target word object
let options = [];             // 4 word objects (includes correct)
let selectedCard = -1;        // index of card clicked (-1 = none)
let feedbackState = 'idle';   // 'idle' | 'correct' | 'wrong' | 'transition'
let feedbackTimer = 0;
let catAnimation = 'idle';    // 'idle' | 'happy' | 'encourage'
let catAnimTimer = 0;
let score = 0;                // won't be displayed, just for level scaling
let roundCount = 0;
let particles = [];
let cardHover = -1;
let gameStarted = false;

// Layout — computed in setup
let cardW, cardH, cardGap;
let cards = [];               // {x, y, w, h, wordObj}
let replayBtn = {x:0, y:0, w:0, h:0};
let startBtn = {x:0, y:0, w:0, h:0};
let catX, catY;

// Voice
let voice = null;

// Cloud positions for idle animation
let clouds = [];

// --- Cat character drawing helpers ---
function drawCat(x, y, scale, anim) {
  push();
  translate(x, y);
  scale(scale);
  
  // Body
  fill(PALETTE.catBody);
  noStroke();
  ellipse(0, 20, 50, 45);
  fill(PALETTE.catBelly);
  ellipse(0, 24, 30, 28);
  
  // Head
  fill(PALETTE.catBody);
  ellipse(0, -15, 48, 44);
  
  // Ears
  triangle(-20, -30, -12, -50, -4, -28);
  triangle( 20, -30,  12, -50,  4, -28);
  fill('#FFD180');
  triangle(-16, -32, -12, -46, -7, -30);
  triangle( 16, -32,  12, -46,  7, -30);
  
  // Eyes
  let eyeY = -17;
  if (anim === 'happy') {
    // Happy squint
    fill('#5D4037');
    noStroke();
    arc(-13, eyeY, 14, 10, PI, TWO_PI, OPEN);
    arc( 13, eyeY, 14, 10, PI, TWO_PI, OPEN);
  } else if (anim === 'encourage') {
    // Wide encouraging eyes
    fill('#FFFFFF');
    ellipse(-13, eyeY, 16, 18);
    ellipse( 13, eyeY, 16, 18);
    fill('#5D4037');
    ellipse(-13, eyeY, 10, 12);
    ellipse( 13, eyeY, 10, 12);
    fill('#FFFFFF');
    ellipse(-11, eyeY-3, 4, 4);
    ellipse( 15, eyeY-3, 4, 4);
  } else {
    // Normal
    fill('#FFFFFF');
    ellipse(-13, eyeY, 15, 16);
    ellipse( 13, eyeY, 15, 16);
    fill('#5D4037');
    ellipse(-12, eyeY, 10, 12);
    ellipse( 14, eyeY, 10, 12);
    fill('#FFFFFF');
    ellipse(-11, eyeY-2, 3.5, 3.5);
    ellipse( 15, eyeY-2, 3.5, 3.5);
  }
  
  // Nose
  fill('#FF80AB');
  triangle(0, -8, -4, -4, 4, -4);
  
  // Mouth
  noFill();
  stroke('#5D4037');
  strokeWeight(2.5);
  if (anim === 'happy') {
    arc(0, -2, 20, 14, 0.1, PI-0.1);
  } else if (anim === 'encourage') {
    arc(0, 2, 14, 8, PI+0.3, TWO_PI-0.3);
  } else {
    arc(-5, 2, 10, 6, 0, PI);
    arc( 5, 2, 10, 6, 0, PI);
  }
  noFill();
  
  // Whiskers
  stroke('#5D4037');
  strokeWeight(1.5);
  line(-22, -6, -38, -10);
  line(-22, -4, -38, -2);
  line( 22, -6,  38, -10);
  line( 22, -4,  38, -2);
  
  // Paws (if happy, wave)
  if (anim === 'happy') {
    fill(PALETTE.catBody);
    noStroke();
    ellipse(-20, 35, 14, 10);
    // wave right paw
    push();
    translate(20, 35);
    rotate(sin(catAnimTimer * 0.15) * 0.6 - 0.3);
    ellipse(0, 0, 14, 10);
    pop();
  } else {
    fill(PALETTE.catBody);
    noStroke();
    ellipse(-20, 35, 14, 10);
    ellipse( 20, 35, 14, 10);
  }
  
  // Tail
  noFill();
  stroke(PALETTE.catBody);
  strokeWeight(6);
  if (anim === 'happy') {
    let wag = sin(catAnimTimer * 0.2) * 0.4;
    bezier(15, 30, 30, 20+wag*20, 25, 0+wag*30, 35, -10+wag*25);
  } else {
    bezier(15, 30, 30, 20, 25, 0, 35, -10);
  }
  
  pop();
}

// --- Particle effects ---
function spawnParticles(x, y, count, color) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y,
      vx: random(-3, 3),
      vy: random(-5, -1),
      life: 60,
      color,
      size: random(4, 10),
    });
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    let p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.1;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  noStroke();
  for (let p of particles) {
    fill(red(p.color), green(p.color), blue(p.color), map(p.life, 60, 0, 200, 0));
    ellipse(p.x, p.y, p.size);
  }
}

// --- Card drawing ---
function drawCard(card, idx) {
  let {x, y, w, h, wordObj} = card;
  let isHover = (cardHover === idx) && feedbackState === 'idle';
  let isSelectedWrong = (selectedCard === idx && feedbackState === 'wrong');
  let isSelectedCorrect = (selectedCard === idx && feedbackState === 'correct');
  let showCorrect = (feedbackState === 'correct' || feedbackState === 'wrong') && wordObj.word === currentWord.word;
  
  // Shadow
  drawingContext.shadowColor = 'rgba(0,0,0,0.08)';
  drawingContext.shadowBlur = 12;
  drawingContext.shadowOffsetY = 4;
  
  // Card background
  if (isSelectedCorrect || (showCorrect && feedbackState !== 'idle')) {
    fill('#C8E6C9');
    stroke('#66BB6A');
  } else if (isSelectedWrong) {
    fill('#FFCDD2');
    stroke('#EF5350');
  } else if (isHover) {
    fill('#FFF9C4');
    stroke('#FFD54F');
  } else {
    fill(PALETTE.cardBg);
    stroke(PALETTE.cardBorder);
  }
  
  strokeWeight(isHover || isSelectedCorrect || isSelectedWrong ? 3 : 1.5);
  rect(x, y, w, h, 18);
  
  // Reset shadow
  drawingContext.shadowColor = 'transparent';
  drawingContext.shadowBlur = 0;
  drawingContext.shadowOffsetY = 0;
  
  // Emoji
  noStroke();
  textAlign(CENTER, CENTER);
  textSize(w * 0.28);
  text(wordObj.emoji, x + w/2, y + h * 0.47);
  
  // Word text (smaller, below emoji)
  fill(PALETTE.text);
  textSize(w * 0.12);
  textStyle(NORMAL);
  text(wordObj.word, x + w/2, y + h * 0.78);
}

// --- Pick new round ---
function pickRound() {
  // Pick a random word
  let idx = floor(random(WORDS.length));
  currentWord = WORDS[idx];
  
  // Build options: 1 correct + 3 randoms diff from correct
  let pool = WORDS.filter((_, i) => i !== idx);
  shuffle(pool, true);
  let wrongs = pool.slice(0, 3);
  
  options = [currentWord].concat(wrongs);
  shuffle(options, true);
  
  // Map to card positions
  cards = [];
  for (let i = 0; i < 4; i++) {
    let col = i % 2;
    let row = floor(i / 2);
    cards.push({
      x: width/2 - cardW - cardGap/2 + col * (cardW + cardGap),
      y: height * 0.25 + row * (cardH + cardGap),
      w: cardW,
      h: cardH,
      wordObj: options[i],
    });
  }
  
  // Replay button position
  replayBtn.w = cardW * 0.4;
  replayBtn.h = 42;
  replayBtn.x = width/2 - replayBtn.w/2;
  replayBtn.y = cards[3].y + cardH + 24;
  
  selectedCard = -1;
  feedbackState = 'idle';
  feedbackTimer = 0;
  cardHover = -1;
}

// --- Speak word ---
function speakWord() {
  if (!currentWord) return;
  let utterance = new SpeechSynthesisUtterance(currentWord.word);
  utterance.lang = 'en-US';
  utterance.rate = 0.85;      // slow and clear
  utterance.pitch = 1.1;      // slightly higher = sweeter
  if (voice) utterance.voice = voice;
  utterance.volume = 1.0;
  window.speechSynthesis.cancel(); // cancel any ongoing
  window.speechSynthesis.speak(utterance);
}

// --- Setup Voice ---
function setupVoice() {
  let voices = window.speechSynthesis.getVoices();
  // Prefer a female English voice
  for (let v of voices) {
    if (v.lang.startsWith('en') && 
        (v.name.includes('Female') || 
         v.name.includes('Google US English') ||
         v.name.includes('Samantha') ||
         v.name.includes('Zira') ||
         v.name.includes('Karen'))) {
      voice = v;
      break;
    }
  }
  // Fallback: any English voice
  if (!voice) {
    for (let v of voices) {
      if (v.lang.startsWith('en')) { voice = v; break; }
    }
  }
}

// --- Start screen ---
function drawStartScreen() {
  // Sky gradient
  for (let y = 0; y < height; y++) {
    let inter = y / height;
    fill(
      lerpColor(color(PALETTE.skyTop), color(PALETTE.skyBottom), inter)
    );
    noStroke();
    rect(0, y, width, 1);
  }
  
  // Clouds
  for (let c of clouds) {
    drawCloud(c.x, c.y, c.size);
  }
  
  // Grass
  fill(PALETTE.grass);
  noStroke();
  rect(0, height * 0.68, width, height * 0.32);
  fill(PALETTE.grassDark);
  rect(0, height * 0.68, width, 6);
  
  // Cat
  drawCat(width * 0.5, height * 0.55, min(width, height) / 500, 'happy');
  
  // Title
  fill('#FFFFFF');
  noStroke();
  rectMode(CENTER);
  rect(width/2, height * 0.16, width * 0.62, 70, 35);
  rectMode(CORNER);
  
  fill(PALETTE.title);
  textAlign(CENTER, CENTER);
  textSize(min(width * 0.06, 36));
  textStyle(BOLD);
  text('🔊 英语声音游戏 🔊', width/2, height * 0.155);
  
  fill('#FFFFFF');
  textSize(min(width * 0.032, 20));
  textStyle(NORMAL);
  text('听声音，点图片！', width/2, height * 0.195);
  
  // Start button
  startBtn.w = min(width * 0.4, 280);
  startBtn.h = 56;
  startBtn.x = width/2 - startBtn.w/2;
  startBtn.y = height * 0.72;
  
  let btnAlpha = 220 + sin(frameCount * 0.05) * 20;
  fill(PALETTE.button);
  noStroke();
  rect(startBtn.x, startBtn.y, startBtn.w, startBtn.h, 28);
  
  fill(PALETTE.buttonText);
  textSize(22);
  textStyle(BOLD);
  text('开始玩吧！', width/2, startBtn.y + startBtn.h/2);
  
  // Decorative flowers
  drawFlower(width * 0.18, height * 0.75, 16, '#FF80AB');
  drawFlower(width * 0.82, height * 0.73, 14, '#CE93D8');
  drawFlower(width * 0.12, height * 0.78, 12, '#FFD54F');
  drawFlower(width * 0.88, height * 0.77, 15, '#FF80AB');
}

function drawCloud(cx, cy, s) {
  fill(255, 240);
  noStroke();
  ellipse(cx, cy, s*1.4, s);
  ellipse(cx-s*0.5, cy+s*0.1, s*0.7, s*0.6);
  ellipse(cx+s*0.5, cy+s*0.05, s*0.8, s*0.55);
  ellipse(cx, cy-s*0.25, s*0.9, s*0.7);
}

function drawFlower(fx, fy, s, col) {
  fill(col);
  noStroke();
  for (let a = 0; a < TWO_PI; a += TWO_PI/5) {
    ellipse(fx + cos(a)*s*0.5, fy + sin(a)*s*0.5, s*0.5, s*0.5);
  }
  fill('#FFEB3B');
  ellipse(fx, fy, s*0.4, s*0.4);
}

// --- Main game screen ---
function drawGameScreen() {
  // Sky
  for (let y = 0; y < height; y++) {
    let inter = y / height;
    fill(lerpColor(color(PALETTE.skyTop), color(PALETTE.skyBottom), inter));
    noStroke();
    rect(0, y, width, 1);
  }
  
  // Clouds
  for (let c of clouds) {
    c.y = c.baseY + sin(frameCount * c.speed + c.offset) * 8;
    drawCloud(c.x, c.y, c.size);
  }
  
  // Grass area
  let grassTop = cards[3].y + cardH + 90;
  fill(PALETTE.grass);
  noStroke();
  rect(0, grassTop, width, height - grassTop);
  fill(PALETTE.grassDark);
  rect(0, grassTop, width, 5);
  
  // Title
  fill(PALETTE.title);
  textAlign(CENTER, CENTER);
  textSize(min(width * 0.045, 26));
  textStyle(BOLD);
  text('听一听，点一点！', width/2, height * 0.08);
  
  // Current word hint (small text)
  if (feedbackState === 'idle') {
    fill('#90A4AE');
    textSize(14);
    textStyle(NORMAL);
    text('点击喇叭重听 🔊', width/2, height * 0.125);
  }
  
  // Draw cards
  for (let i = 0; i < cards.length; i++) {
    drawCard(cards[i], i);
  }
  
  // Feedback overlay
  if (feedbackState === 'correct') {
    drawCat(catX, catY, min(width, height) / 480, 'happy');
    fill('#2E7D32');
    textAlign(CENTER);
    textSize(36);
    textStyle(BOLD);
    text('✨ 太棒了！ ✨', width/2, height * 0.19);
  } else if (feedbackState === 'wrong') {
    drawCat(catX, catY, min(width, height) / 480, 'encourage');
    fill('#C62828');
    textAlign(CENTER);
    textSize(22);
    textStyle(BOLD);
    text('再试试！听听是哪个呢？', width/2, height * 0.19);
  } else {
    drawCat(catX, catY, min(width, height) / 480, 'idle');
  }
  
  // Replay button (show during idle or wrong)
  if (feedbackState === 'idle' || feedbackState === 'wrong') {
    let btnAlpha = feedbackState === 'idle' ? 220 : 255;
    fill(PALETTE.button);
    noStroke();
    rect(replayBtn.x, replayBtn.y, replayBtn.w, replayBtn.h, 21);
    fill(PALETTE.buttonText);
    textSize(18);
    textStyle(BOLD);
    textAlign(CENTER, CENTER);
    text('🔊 再听一遍', replayBtn.x + replayBtn.w/2, replayBtn.y + replayBtn.h/2);
  }
  
  // Particles
  drawParticles();
}

// --- p5.js Lifecycle ---
function setup() {
  try { _realSetup(); } catch(e) {
    let lm = document.getElementById('loading-msg');
    if (lm) lm.innerHTML = '🐛 出了点小问题...<br><span style="font-size:12px;color:#999">' + e.message + '<br>请截图发给爸爸</span>';
    console.error(e);
  }
}
function _realSetup() {
  // Responsive canvas
  let cw = min(windowWidth, windowHeight * 1.4);
  let ch = min(windowHeight, windowWidth * 0.72);
  let canvas = createCanvas(cw, ch);
  canvas.parent('canvas-container');
  let lm = document.getElementById('loading-msg');
  if (lm) lm.style.display = 'none';
  
  colorMode(RGB, 255, 255, 255, 255);
  
  // Compute layout
  cardW = width * 0.32;
  cardH = height * 0.2;
  cardGap = width * 0.04;
  
  catX = width * 0.12;
  catY = height * 0.72;
  
  // Init clouds
  clouds = [];
  for (let i = 0; i < 5; i++) {
    clouds.push({
      x: random(width),
      y: random(height * 0.05, height * 0.12),
      baseY: random(height * 0.05, height * 0.12),
      size: random(30, 70),
      speed: random(0.003, 0.008),
      offset: random(TWO_PI),
    });
  }
  
  // Init voice
  setupVoice();
  if (window.speechSynthesis.onvoiceschanged !== undefined) {
    window.speechSynthesis.onvoiceschanged = setupVoice;
  }
  
  // Start state
  gameStarted = false;
  textFont('sans-serif');
  
  // Pre-pick first round
  pickRound();
}

function draw() {
  updateParticles();
  catAnimTimer++;
  
  if (!gameStarted) {
    drawStartScreen();
  } else {
    drawGameScreen();
    
    // Feedback timer
    if (feedbackState === 'correct' || feedbackState === 'wrong') {
      feedbackTimer--;
      if (feedbackTimer <= 0) {
        feedbackState = 'idle';
        selectedCard = -1;
        pickRound();
        // Auto-speak new word after short delay
        setTimeout(speakWord, 400);
      }
    }
  }
}

function mousePressed() {
  if (!gameStarted) {
    // Check start button
    if (
      mouseX >= startBtn.x && mouseX <= startBtn.x + startBtn.w &&
      mouseY >= startBtn.y && mouseY <= startBtn.y + startBtn.h
    ) {
      gameStarted = true;
      pickRound();
      setTimeout(speakWord, 500);
    }
    return;
  }
  
  // Check replay button
  if (feedbackState === 'idle' || feedbackState === 'wrong') {
    if (
      mouseX >= replayBtn.x && mouseX <= replayBtn.x + replayBtn.w &&
      mouseY >= replayBtn.y && mouseY <= replayBtn.y + replayBtn.h
    ) {
      speakWord();
      return;
    }
  }
  
  // Check cards (only in idle state)
  if (feedbackState !== 'idle') return;
  
  for (let i = 0; i < cards.length; i++) {
    let c = cards[i];
    if (
      mouseX >= c.x && mouseX <= c.x + c.w &&
      mouseY >= c.y && mouseY <= c.y + c.h
    ) {
      selectedCard = i;
      if (c.wordObj.word === currentWord.word) {
        // Correct!
        feedbackState = 'correct';
        feedbackTimer = 90; // 1.5 seconds
        score++;
        roundCount++;
        catAnimation = 'happy';
        catAnimTimer = 0;
        spawnParticles(width/2, height * 0.35, 30, color('#FFD54F'));
        spawnParticles(width/2, height * 0.35, 20, color('#FF80AB'));
        // Celebrate speech
        let cheers = new SpeechSynthesisUtterance(
          random(['Great!', 'Wonderful!', 'Awesome!', 'Yay!', 'Amazing!'])
        );
        cheers.lang = 'en-US';
        cheers.rate = 0.9;
        cheers.pitch = 1.2;
        if (voice) cheers.voice = voice;
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(cheers);
        // Then repeat the word
        setTimeout(() => {
          let repeat = new SpeechSynthesisUtterance(currentWord.word);
          repeat.lang = 'en-US'; repeat.rate = 0.85; repeat.pitch = 1.1;
          if (voice) repeat.voice = voice;
          window.speechSynthesis.speak(repeat);
        }, 800);
      } else {
        // Wrong — gentle
        feedbackState = 'wrong';
        feedbackTimer = 100; // ~1.7 seconds
        catAnimation = 'encourage';
        catAnimTimer = 0;
        // Gentle prompt
        let prompt = new SpeechSynthesisUtterance('Try again!');
        prompt.lang = 'en-US';
        prompt.rate = 0.85;
        prompt.pitch = 1.1;
        if (voice) prompt.voice = voice;
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(prompt);
        // Re-speak the target word after a moment
        setTimeout(speakWord, 1200);
      }
      break;
    }
  }
}

function mouseMoved() {
  if (!gameStarted || feedbackState !== 'idle') {
    cardHover = -1;
    return;
  }
  let found = false;
  for (let i = 0; i < cards.length; i++) {
    let c = cards[i];
    if (
      mouseX >= c.x && mouseX <= c.x + c.w &&
      mouseY >= c.y && mouseY <= c.y + c.h
    ) {
      cardHover = i;
      found = true;
      break;
    }
  }
  if (!found) cardHover = -1;
}

// Touch support (mobile)
function touchStarted() {
  mousePressed();
  return false; // prevent default
}

function touchMoved() {
  mouseMoved();
  return false;
}

function windowResized() {
  let cw = min(windowWidth, windowHeight * 1.4);
  let ch = min(windowHeight, windowWidth * 0.72);
  resizeCanvas(cw, ch);
  
  cardW = width * 0.32;
  cardH = height * 0.2;
  cardGap = width * 0.04;
  
  catX = width * 0.12;
  catY = height * 0.72;
  
  if (gameStarted) pickRound();
}
</script>
